{% extends "base.html" %}

{% block content %}
<div class="h-full flex flex-col gap-4">
    <div class="flex justify-between items-center border-b border-terminal-border pb-4">
        <div>
            <h1 class="text-2xl font-bold text-white">🚨 SEPSIS EARLY DETECTION</h1>
            <p class="text-sm text-gray-400 mt-1">Real-time sepsis screening using qSOFA, SIRS, and SOFA scoring systems
            </p>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 flex-1 overflow-hidden">
        <!-- LEFT: Patient & Vitals Input -->
        <div class="flex flex-col gap-4 overflow-auto custom-scrollbar">
            <div class="bg-white/5 border border-terminal-border p-4 rounded">
                <h2 class="text-terminal-green font-bold mb-3">PATIENT SELECTION</h2>
                <select id="patientSelect"
                    class="w-full bg-gray-900 border border-terminal-border px-3 py-2 text-white focus:border-terminal-green outline-none rounded">
                    <option value="">Select Patient</option>
                </select>
            </div>

            <div class="bg-white/5 border border-terminal-border p-4 rounded">
                <h2 class="text-terminal-green font-bold mb-3">CURRENT VITALS *</h2>
                <div class="grid grid-cols-2 gap-3 text-sm">
                    <div>
                        <label class="text-xs text-gray-400 block mb-1">Temperature (°C)</label>
                        <input type="number" id="temp" step="0.1" placeholder="37.0"
                            class="w-full bg-gray-900 border border-terminal-border px-2 py-2 text-white rounded">
                    </div>
                    <div>
                        <label class="text-xs text-gray-400 block mb-1">Heart Rate (bpm)</label>
                        <input type="number" id="hr" placeholder="80"
                            class="w-full bg-gray-900 border border-terminal-border px-2 py-2 text-white rounded">
                    </div>
                    <div>
                        <label class="text-xs text-gray-400 block mb-1">Resp Rate (/min)</label>
                        <input type="number" id="rr" placeholder="16"
                            class="w-full bg-gray-900 border border-terminal-border px-2 py-2 text-white rounded">
                    </div>
                    <div>
                        <label class="text-xs text-gray-400 block mb-1">Systolic BP (mmHg)</label>
                        <input type="number" id="sbp" placeholder="120"
                            class="w-full bg-gray-900 border border-terminal-border px-2 py-2 text-white rounded">
                    </div>
                    <div>
                        <label class="text-xs text-gray-400 block mb-1">MAP (mmHg)</label>
                        <input type="number" id="map" placeholder="90"
                            class="w-full bg-gray-900 border border-terminal-border px-2 py-2 text-white rounded">
                    </div>
                    <div>
                        <label class="text-xs text-gray-400 block mb-1">SpO2 (%)</label>
                        <input type="number" id="spo2" placeholder="98"
                            class="w-full bg-gray-900 border border-terminal-border px-2 py-2 text-white rounded">
                    </div>
                    <div class="col-span-2">
                        <label class="text-xs text-gray-400 block mb-1">Mental Status</label>
                        <select id="mental_status"
                            class="w-full bg-gray-900 border border-terminal-border px-2 py-2 text-white rounded">
                            <option value="alert">Alert</option>
                            <option value="confused">Confused</option>
                            <option value="lethargic">Lethargic</option>
                            <option value="obtunded">Obtunded</option>
                            <option value="unresponsive">Unresponsive</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="bg-white/5 border border-terminal-border p-4 rounded">
                <h2 class="text-terminal-green font-bold mb-3">LABS (OPTIONAL)</h2>
                <div class="grid grid-cols-2 gap-3 text-sm">
                    <div>
                        <label class="text-xs text-gray-400 block mb-1">WBC (x10³/μL)</label>
                        <input type="number" id="wbc" step="0.1" placeholder="7.0"
                            class="w-full bg-gray-900 border border-terminal-border px-2 py-2 text-white rounded">
                    </div>
                    <div>
                        <label class="text-xs text-gray-400 block mb-1">Lactate (mmol/L)</label>
                        <input type="number" id="lactate" step="0.1" placeholder="1.5"
                            class="w-full bg-gray-900 border border-terminal-border px-2 py-2 text-white rounded">
                    </div>
                    <div>
                        <label class="text-xs text-gray-400 block mb-1">Platelets (x10³/μL)</label>
                        <input type="number" id="platelets" placeholder="200"
                            class="w-full bg-gray-900 border border-terminal-border px-2 py-2 text-white rounded">
                    </div>
                    <div>
                        <label class="text-xs text-gray-400 block mb-1">Creatinine (mg/dL)</label>
                        <input type="number" id="creatinine" step="0.1" placeholder="1.0"
                            class="w-full bg-gray-900 border border-terminal-border px-2 py-2 text-white rounded">
                    </div>
                </div>
            </div>

            <button onclick="screenSepsis()"
                class="bg-red-500 text-white font-bold py-3 rounded hover:bg-red-400 transition">
                🚨 SCREEN FOR SEPSIS
            </button>
        </div>

        <!-- RIGHT: Results -->
        <div class="overflow-auto custom-scrollbar">
            <div id="resultsContainer" class="text-gray-500 text-center p-8">
                Enter patient vitals to begin sepsis screening
            </div>
        </div>
    </div>
</div>

<script>
    let currentPatient = null;

    async function loadPatients() {
        try {
            const res = await fetch('/api/patients');
            const patients = await res.json();
            const select = document.getElementById('patientSelect');

            patients.forEach(p => {
                const option = document.createElement('option');
                option.value = p.id;
                option.textContent = `#${p.id} - ${p.name} (${p.age}yo, ${p.sex})`;
                select.appendChild(option);
            });
        } catch (e) {
            console.error(e);
        }
    }

    document.getElementById('patientSelect').addEventListener('change', async (e) => {
        if (e.target.value) {
            const res = await fetch(`/api/patients/${e.target.value}`);
            currentPatient = await res.json();

            // Prepopulate vitals if available
            if (currentPatient.vitals) {
                document.getElementById('hr').value = currentPatient.vitals.heart_rate || '';
                document.getElementById('rr').value = currentPatient.vitals.respiratory_rate || '';
                document.getElementById('sbp').value = currentPatient.vitals.bp_systolic || '';
                document.getElementById('spo2').value = currentPatient.vitals.spO2 || '';

                // Convert F to C if temp is in Fahrenheit
                if (currentPatient.vitals.temp) {
                    const tempC = ((currentPatient.vitals.temp - 32) * 5 / 9).toFixed(1);
                    document.getElementById('temp').value = tempC;
                }
            }
        } else {
            currentPatient = null;
        }
    });

    async function screenSepsis() {
        // Validate required fields
        const temp = parseFloat(document.getElementById('temp').value);
        const hr = parseInt(document.getElementById('hr').value);
        const rr = parseInt(document.getElementById('rr').value);
        const sbp = parseInt(document.getElementById('sbp').value);

        if (!temp || !hr || !rr || !sbp) {
            alert('Please enter at least: Temperature, Heart Rate, Respiratory Rate, and Systolic BP');
            return;
        }

        const vitals = {
            temp_c: temp,
            hr: hr,
            rr: rr,
            sbp: sbp,
            map: parseInt(document.getElementById('map').value) || null,
            spo2: parseInt(document.getElementById('spo2').value) || null,
            mental_status: document.getElementById('mental_status').value
        };

        const labs = {};
        const wbc = parseFloat(document.getElementById('wbc').value);
        const lactate = parseFloat(document.getElementById('lactate').value);
        const platelets = parseFloat(document.getElementById('platelets').value);
        const creatinine = parseFloat(document.getElementById('creatinine').value);

        if (wbc) labs.wbc = { value: wbc };
        if (lactate) labs.lactate = lactate;
        if (platelets) labs.platelets = { value: platelets };
        if (creatinine) labs.creatinine = { value: creatinine };

        const resultsDiv = document.getElementById('resultsContainer');
        resultsDiv.innerHTML = '<div class="text-yellow-500 animate-pulse text-center p-8">🚨 Analyzing for sepsis...</div>';

        try {
            const res = await fetch('/api/sepsis-screening', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    patient_id: currentPatient?.id,
                    vitals: vitals,
                    labs: Object.keys(labs).length > 0 ? labs : null
                })
            });

            const data = await res.json();
            displaySepsisResults(data);

        } catch (e) {
            console.error(e);
            resultsDiv.innerHTML = '<div class="text-red-500 p-4">Screening failed</div>';
        }
    }

    function displaySepsisResults(data) {
        const alertColorMap = {
            'CRITICAL': 'red',
            'URGENT': 'orange',
            'CAUTION': 'yellow',
            'ROUTINE': 'green'
        };
        const alertColor = alertColorMap[data.alert_level] || 'gray';

        let html = '<div class="space-y-4">';

        // Main Alert Card
        html += `
            <div class="bg-gradient-to-br from-${alertColor}-500/20 to-${alertColor}-500/5 border-2 border-${alertColor}-500 p-4 rounded">
                <div class="flex justify-between items-start mb-3">
                    <div>
                        <div class="text-${alertColor}-400 font-bold text-lg">
                            ${data.alert_level === 'CRITICAL' ? '🚨 CRITICAL ALERT' :
                data.alert_level === 'URGENT' ? '⚠️ URGENT' :
                    data.alert_level === 'CAUTION' ? '⚡ CAUTION' : '✓ LOW RISK'}
                        </div>
                        <div class="text-white text-xl font-bold mt-1">${data.sepsis_risk}</div>
                    </div>
                    <div class="text-${alertColor}-400 text-4xl">${data.alert_level === 'CRITICAL' ? '🚨' :
                data.alert_level === 'URGENT' ? '⚠️' :
                    data.alert_level === 'CAUTION' ? '⚡' : '✓'
            }</div>
                </div>
                
                ${data.alert_level === 'CRITICAL' || data.alert_level === 'URGENT' ? `
                    <div class="border-t-2 border-${alertColor}-500/50 pt-3 mt-3">
                        <div class="text-${alertColor}-300 font-bold mb-2">IMMEDIATE ACTIONS:</div>
                        <div class="space-y-1 text-sm">
                            ${data.recommendations.map(r => `<div class="text-white">• ${r}</div>`).join('')}
                        </div>
                    </div>
                ` : ''}
            </div>
        `;

        // Scoring Systems
        html += '<div class="grid grid-cols-3 gap-4">';

        // qSOFA
        const qsofaColor = data.qsofa_score.score >= 2 ? 'red' : data.qsofa_score.score === 1 ? 'yellow' : 'green';
        html += `
            <div class="bg-white/5 border border-${qsofaColor}-500/50 p-4 rounded">
                <div class="text-${qsofaColor}-400 font-bold mb-2">qSOFA SCORE</div>
                <div class="text-white text-3xl font-bold">${data.qsofa_score.score}/3</div>
                <div class="text-xs text-gray-400 mt-2">${data.qsofa_score.interpretation}</div>
                ${data.qsofa_score.criteria_met.length > 0 ? `
                    <div class="mt-3 border-t border-gray-700 pt-2">
                        ${data.qsofa_score.criteria_met.map(c => `<div class="text-xs text-${qsofaColor}-300">✓ ${c}</div>`).join('')}
                    </div>
                ` : ''}
            </div>
        `;

        // SIRS
        const sirsColor = data.sirs_score.sirs_positive ? 'orange' : 'green';
        html += `
            <div class="bg-white/5 border border-${sirsColor}-500/50 p-4 rounded">
                <div class="text-${sirsColor}-400 font-bold mb-2">SIRS CRITERIA</div>
                <div class="text-white text-3xl font-bold">${data.sirs_score.criteria_met}/4</div>
                <div class="text-xs text-gray-400 mt-2">${data.sirs_score.interpretation}</div>
                ${data.sirs_score.criteria.length > 0 ? `
                    <div class="mt-3 border-t border-gray-700 pt-2">
                        ${data.sirs_score.criteria.map(c => `<div class="text-xs text-${sirsColor}-300">✓ ${c}</div>`).join('')}
                    </div>
                ` : ''}
            </div>
        `;

        // SOFA (if available)
        if (data.sofa_score) {
            const sofaColor = data.sofa_score.total_score >= 10 ? 'red' :
                data.sofa_score.total_score >= 5 ? 'orange' :
                    data.sofa_score.total_score >= 2 ? 'yellow' : 'green';
            html += `
                <div class="bg-white/5 border border-${sofaColor}-500/50 p-4 rounded">
                    <div class="text-${sofaColor}-400 font-bold mb-2">SOFA SCORE</div>
                    <div class="text-white text-3xl font-bold">${data.sofa_score.total_score}/24</div>
                    <div class="text-xs text-gray-400 mt-2">${data.sofa_score.interpretation}</div>
                    <div class="text-xs text-red-400 mt-1">Mortality: ${data.sofa_score.mortality_risk}</div>
                </div>
            `;
        }

        html += '</div>';

        // Sepsis Bundle if activated
        if (data.bundle_checklist) {
            html += `
                <div class="bg-blue-500/10 border border-blue-500/30 p-4 rounded">
                    <div class="text-blue-400 font-bold mb-3">⏱️ 1-HOUR SEPSIS BUNDLE</div>
                    <div class="text-xs text-gray-400 mb-3">Bundle activated at: ${new Date(data.bundle_checklist.bundle_activated).toLocaleString()}</div>
                    <div class="space-y-2">
                        ${data.bundle_checklist.tasks.map(task => `
                            <div class="flex items-center gap-2 text-sm">
                                <input type="checkbox" ${task.completed ? 'checked' : ''} class="w-4 h-4">
                                <span class="${task.completed ? 'text-green-400' : 'text-white'}">${task.task}</span>
                                <span class="text-xs text-gray-500 ml-auto">${task.deadline}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        html += '</div>';
        document.getElementById('resultsContainer').innerHTML = html;
        lucide.createIcons();
    }

    // Initialize
    loadPatients();
    lucide.createIcons();
</script>
{% endblock %}
